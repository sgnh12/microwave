<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="レンジ変換">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>電子レンジ 時間変換</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:#f2f2f7;color:#111;min-height:100dvh;display:flex;flex-direction:column}

/* header */
.header{background:#fff;padding:env(safe-area-inset-top,0) 20px 0;border-bottom:0.5px solid #e0e0e0}
.header-inner{padding:14px 0 12px}
.header h1{font-size:17px;font-weight:600;color:#111}
.header p{font-size:12px;color:#888;margin-top:2px}

/* main */
main{flex:1;padding:16px;display:flex;flex-direction:column;gap:12px;max-width:480px;width:100%;margin:0 auto}

/* card */
.card{background:#fff;border-radius:14px;padding:16px;border:0.5px solid #e8e8e8}
.card-label{font-size:11px;font-weight:600;color:#888;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:12px}

/* picker */
.picker-row{display:flex;gap:8px;justify-content:center;align-items:flex-end}
.picker-col{display:flex;flex-direction:column;align-items:center;gap:4px}
.picker-unit{font-size:11px;color:#888}
.drum{height:108px;overflow:hidden;position:relative;width:80px;border-radius:10px;background:#f5f5f5;cursor:ns-resize;user-select:none;-webkit-user-select:none}
.drum-inner{will-change:transform}
.drum-item{height:36px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#ccc;font-variant-numeric:tabular-nums}
.drum-item.sel{font-size:21px;font-weight:700;color:#111}
.drum-top{position:absolute;top:0;left:0;right:0;height:36px;background:linear-gradient(to bottom,rgba(245,245,245,1),rgba(245,245,245,0));pointer-events:none}
.drum-bot{position:absolute;bottom:0;left:0;right:0;height:36px;background:linear-gradient(to top,rgba(245,245,245,1),rgba(245,245,245,0));pointer-events:none}
.drum-sel{position:absolute;top:36px;left:6px;right:6px;height:36px;border-top:1.5px solid #111;border-bottom:1.5px solid #111;border-radius:4px;pointer-events:none}

/* result */
.result{background:#f5f5f5;border-radius:10px;padding:16px}
.result-label{font-size:11px;color:#666;margin-bottom:4px}
.result-value{font-size:32px;font-weight:500;color:#111;letter-spacing:-0.5px}
.result-formula{font-size:12px;color:#999;margin-top:4px}

/* footer */
.footer{text-align:center;padding:12px 16px calc(env(safe-area-inset-bottom,0) + 12px);font-size:11px;color:#bbb}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <h1>電子レンジ 時間変換</h1>
    <p>W数を変えて加熱時間を計算</p>
  </div>
</div>

<main>
  <div class="card">
    <div class="card-label">元の設定</div>
    <div class="picker-row">
      <div class="picker-col">
        <div class="drum" id="d-w1"></div>
        <div class="picker-unit">W数</div>
      </div>
      <div class="picker-col">
        <div class="drum" id="d-min"></div>
        <div class="picker-unit">分</div>
      </div>
      <div class="picker-col">
        <div class="drum" id="d-sec"></div>
        <div class="picker-unit">秒</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">変換後のW数</div>
    <div class="picker-row" style="justify-content:flex-start;padding-left:4px">
      <div class="picker-col">
        <div class="drum" id="d-w2"></div>
        <div class="picker-unit">W数</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">加熱時間</div>
    <div class="result">
      <div class="result-label">変換後の時間</div>
      <div class="result-value" id="r-val">—</div>
      <div class="result-formula" id="r-formula"></div>
    </div>
  </div>
</main>

<div class="footer">W₁ × t₁ = W₂ × t₂</div>

<script>
const WATTS=[200,300,400,500,600,700,800,1000,1200,1500];
const MINS=Array.from({length:31},(_,i)=>i);
const SECS=[0,5,10,15,20,25,30,35,40,45,50,55];

function fmt(items,i){
  const v=items[i];
  if(items===WATTS)return v+'W';
  return String(v).padStart(2,'0');
}

function buildDrum(el,items,initIdx){
  el._items=items;
  el._idx=initIdx;
  el._offset=0;

  const inner=document.createElement('div');
  inner.className='drum-inner';
  items.forEach((v,i)=>{
    const d=document.createElement('div');
    d.className='drum-item'+(i===initIdx?' sel':'');
    d.textContent=fmt(items,i);
    inner.appendChild(d);
  });
  const top=document.createElement('div');top.className='drum-top';
  const bot=document.createElement('div');bot.className='drum-bot';
  const sel=document.createElement('div');sel.className='drum-sel';
  el.appendChild(inner);el.appendChild(top);el.appendChild(bot);el.appendChild(sel);
  el._inner=inner;

  setPos(el,initIdx,false);
  addGesture(el);
}

function setPos(el,idx,animate){
  idx=Math.max(0,Math.min(el._items.length-1,idx));
  el._idx=idx;
  el._inner.style.transition=animate?'transform 0.18s cubic-bezier(0.25,0.46,0.45,0.94)':'none';
  el._inner.style.transform=`translateY(${-idx*36}px)`;
  el._inner.querySelectorAll('.drum-item').forEach((d,i)=>{
    d.className='drum-item'+(i===idx?' sel':'');
  });
}

function addGesture(el){
  let sy,si,moved=false;

  function start(y){sy=y;si=el._idx;moved=false;}
  function move(y){
    moved=true;
    const dy=sy-y;
    const raw=si+dy/36;
    const clamped=Math.max(0,Math.min(el._items.length-1,raw));
    el._inner.style.transition='none';
    el._inner.style.transform=`translateY(${-clamped*36}px)`;
    el._inner.querySelectorAll('.drum-item').forEach((d,i)=>{
      d.className='drum-item'+(i===Math.round(clamped)?' sel':'');
    });
  }
  function end(y){
    const dy=sy-y;
    const idx=Math.round(si+dy/36);
    setPos(el,idx,true);
    calc();
  }

  el.addEventListener('mousedown',e=>{start(e.clientY);
    const mm=e2=>{move(e2.clientY);};
    const mu=e2=>{window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);end(e2.clientY);};
    window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);
    e.preventDefault();
  });
  el.addEventListener('touchstart',e=>{start(e.touches[0].clientY);},{passive:true});
  el.addEventListener('touchmove',e=>{move(e.touches[0].clientY);e.preventDefault();},{passive:false});
  el.addEventListener('touchend',e=>{end(e.changedTouches[0].clientY);});
}

function calc(){
  const w1=WATTS[document.getElementById('d-w1')._idx];
  const m=MINS[document.getElementById('d-min')._idx];
  const s=SECS[document.getElementById('d-sec')._idx];
  const w2=WATTS[document.getElementById('d-w2')._idx];
  const total=m*60+s;
  const rv=document.getElementById('r-val');
  const rf=document.getElementById('r-formula');
  if(total===0){rv.textContent='—';rf.textContent='';return;}
  const t2=Math.round(total*w1/w2);
  const rm=Math.floor(t2/60),rs=t2%60;
  let txt='';
  if(rm>0)txt+=rm+'分';
  if(rs>0)txt+=rs+'秒';
  if(!txt)txt='0秒';
  rv.textContent=txt;
  rf.textContent=`${w1}W・${m}分${s?s+'秒':''} → ${w2}W換算`;
}

buildDrum(document.getElementById('d-w1'),WATTS,4);
buildDrum(document.getElementById('d-min'),MINS,3);
buildDrum(document.getElementById('d-sec'),SECS,0);
buildDrum(document.getElementById('d-w2'),WATTS,6);
calc();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
